services:
  postgres:
    image: postgres:16
    container_name: dodgeai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: o2c_graph
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d o2c_graph"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
